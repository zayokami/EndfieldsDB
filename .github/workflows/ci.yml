name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STRICT_CMAKE_FLAGS: >-
    -DENDFIELDS_WARNINGS_AS_ERRORS=ON
    -DENDFIELDS_CI_FAST=ON

jobs:
  linux-gcc:
    name: Linux GCC / ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - id: release
            build_type: Release
            sanitize: OFF
            tsan: OFF
            prefetch: ON
          - id: debug
            build_type: Debug
            sanitize: OFF
            tsan: OFF
            prefetch: ON
          - id: no-prefetch
            build_type: Release
            sanitize: OFF
            tsan: OFF
            prefetch: OFF
          - id: asan-ubsan
            build_type: Debug
            sanitize: ON
            tsan: OFF
            prefetch: ON
          - id: tsan
            build_type: RelWithDebInfo
            sanitize: OFF
            tsan: ON
            prefetch: ON
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake gcc

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DENDFIELDS_ENABLE_PREFETCH=${{ matrix.prefetch }}
          -DENDFIELDS_SANITIZE=${{ matrix.sanitize }}
          -DENDFIELDS_TSAN=${{ matrix.tsan }}
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 900 --no-tests=error

  coverage:
    name: Linux GCC / coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake gcc lcov

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DENDFIELDS_COVERAGE=ON
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 900 --no-tests=error

      - name: Capture coverage
        run: |
          set -euo pipefail
          lcov --directory build --capture --output-file coverage.raw.info --rc branch_coverage=0
          lcov --remove coverage.raw.info '/usr/*' '*/build/*' --output-file coverage.info
          genhtml coverage.info --output-directory build/coverage-html --quiet
          lcov --summary coverage.info

      - name: Coverage summary
        run: |
          set -euo pipefail
          summary="$(lcov --summary coverage.info 2>&1)"
          echo "${summary}"
          line_rate="$(echo "${summary}" | awk '/lines\.\.\.:/{print $2}')"
          echo "line_coverage=${line_rate}" >> "${GITHUB_ENV}"
          echo "### Code coverage" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          echo "${summary}" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage-html
          if-no-files-found: error

      - name: Upload lcov data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.info
          if-no-files-found: error

  linux-clang:
    name: Linux Clang / Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake clang

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 900 --no-tests=error

  macos-clang:
    name: macOS Clang / Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 900 --no-tests=error

  windows-msvc:
    name: Windows MSVC / Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --timeout 900 --no-tests=error

  windows-mingw:
    name: Windows MinGW / Release
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make

      - name: Configure
        run: >
          cmake -B build
          -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 900 --no-tests=error

  windows-mingw-debug:
    name: Windows MinGW / Debug
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make

      - name: Configure
        run: >
          cmake -B build
          -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Debug
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 900 --no-tests=error

  static-analysis:
    name: Linux static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cmake clang clang-tidy cppcheck

      - name: Generate compile_commands.json
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: clang-tidy
        run: |
          set -euo pipefail
          mapfile -t sources < <(find src -name '*.c' | sort)
          for source in "${sources[@]}"; do
            echo "clang-tidy: ${source}"
            clang-tidy "${source}" -p build --quiet
          done

      - name: cppcheck
        run: >
          cppcheck
          --inline-suppr
          --quiet
          --error-exitcode=1
          --enable=warning,performance,portability
          -I src
          --suppress=missingIncludeSystem
          src/

  embedded:
    name: Linux embedded-only / Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake gcc

      - name: Configure
        run: >
          cmake -B build-embedded
          -DENDFIELDS_EMBEDDED_ONLY=ON
          -DCMAKE_BUILD_TYPE=Release
          ${{ env.STRICT_CMAKE_FLAGS }}

      - name: Build
        run: cmake --build build-embedded --parallel

      - name: Test
        run: ctest --test-dir build-embedded --output-on-failure --timeout 300 --no-tests=error

  ci-summary:
    name: CI gate
    runs-on: ubuntu-latest
    needs:
      - linux-gcc
      - coverage
      - linux-clang
      - macos-clang
      - windows-msvc
      - windows-mingw
      - windows-mingw-debug
      - static-analysis
      - embedded
    if: always()
    steps:
      - name: Require all jobs
        run: |
          test "${{ needs.linux-gcc.result }}" = "success"
          test "${{ needs.coverage.result }}" = "success"
          test "${{ needs.linux-clang.result }}" = "success"
          test "${{ needs.macos-clang.result }}" = "success"
          test "${{ needs.windows-msvc.result }}" = "success"
          test "${{ needs.windows-mingw.result }}" = "success"
          test "${{ needs.windows-mingw-debug.result }}" = "success"
          test "${{ needs.static-analysis.result }}" = "success"
          test "${{ needs.embedded.result }}" = "success"
